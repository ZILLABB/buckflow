name: buckflow_mobile
description: BuckFlow AI - WhatsApp automation for Nigerian businesses
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP & networking
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Charts for analytics
  fl_chart: ^0.70.2

  # URL launcher (for Paystack payment)
  url_launcher: ^6.3.1

  # Formatting (Naira, dates)
  intl: ^0.19.0

  # UI utilities
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

# ── App Icon Config ──
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app-icon.png"
  adaptive_icon_foreground: "assets/app-icon-foreground.png"
  adaptive_icon_background: "#10b981"
  min_sdk_android: 21

# ── Splash Screen Config ──
flutter_native_splash:
  color: "#0f172a"
  image: "assets/app-icon.png"
  android_12:
    color: "#0f172a"
    image: "assets/app-icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: Outfit
      fonts:
        - asset: fonts/Outfit-Regular.ttf
        - asset: fonts/Outfit-Bold.ttf
          weight: 700
