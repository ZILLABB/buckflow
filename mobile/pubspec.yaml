name: buckflow_mobile
description: BuckFlow AI - WhatsApp automation for Nigerian businesses
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP & networking
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Charts for analytics
  fl_chart: ^0.70.2

  # URL launcher (for Paystack payment)
  url_launcher: ^6.3.1

  # Formatting (Naira, dates)
  intl: ^0.19.0

  # UI utilities
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Outfit
      fonts:
        - asset: fonts/Outfit-Regular.ttf
        - asset: fonts/Outfit-Bold.ttf
          weight: 700
