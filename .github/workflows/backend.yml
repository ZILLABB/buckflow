name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: buckflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/buckflow_test
      SECRET_KEY: ci-test-secret-key
      WHATSAPP_VERIFY_TOKEN: ci-test-token
      WHATSAPP_API_TOKEN: ci-test-api-token
      WHATSAPP_PHONE_NUMBER_ID: ci-test-phone-id
      ENVIRONMENT: testing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install ruff
          ruff check app/ --select E,W,F --ignore E501

      - name: Run tests
        run: |
          python -m pytest app/tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t buckflow-backend ./backend

      - name: Verify container starts
        run: |
          docker run -d --name buckflow-test \
            -e DATABASE_URL=postgresql://test:test@localhost:5432/test \
            -e SECRET_KEY=test \
            -e WHATSAPP_VERIFY_TOKEN=test \
            -e WHATSAPP_API_TOKEN=test \
            -e WHATSAPP_PHONE_NUMBER_ID=test \
            -p 8000:8000 \
            buckflow-backend || true
          sleep 3
          docker logs buckflow-test || true
          docker stop buckflow-test || true
